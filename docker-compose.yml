version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000" # Maps local 3000 to container 3000
    environment:
      - CHOKIDAR_USEPOLLING=true # This helps "Hot Reload" work inside Docker

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3000" # Maps local 3001 to container 3000
    environment:
      - CHOKIDAR_USEPOLLING=true